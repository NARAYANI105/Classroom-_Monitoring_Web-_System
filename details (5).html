body{
    font-family:'Segoe UI',sans-serif;
    background:linear-gradient(135deg,#667eea,#764ba2);
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
    margin:0;
}

.container{
    background:#fff;
    padding:25px;
    border-radius:12px;
    width:900px;
    box-shadow:0 10px 25px rgba(0,0,0,0.2);
}

h2{
    text-align:center;
    margin-bottom:20px;
}

.grid{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:25px;
}

.column{
    display:flex;
    flex-direction:column;
}

label{
    font-weight:600;
    margin-top:10px;
}

input,select,textarea{
    padding:8px;
    margin-top:5px;
    border-radius:6px;
    border:1px solid #ccc;
}

textarea{
    resize:none;
    height:90px;
}

.readonly{
    background:#eaeaea;
}

button{
    margin-top:20px;
    width:100%;
    padding:12px;
    border:none;
    border-radius:8px;
    background:#6a11cb;
    color:#fff;
    font-size:16px;
    cursor:pointer;
}

#lastSaved{
    text-align:center;
    margin-top:10px;
    font-size:14px;
    color:#444;
}
</style>
</head>

<h2 id="title">Classroom Details</h2>

</div>

<button id="saveBtn">Save</button>

// 📌 ELEMENTS
const code = document.getElementById("code");
const title = document.getElementById("title");
const strength = document.getElementById("strength");
const benches = document.getElementById("benches");
const advisor = document.getElementById("advisor");
const mentor = document.getElementById("mentor");

const status = document.getElementById("status");
const cpu = document.getElementById("cpu");
const projector = document.getElementById("projector");
const battery = document.getElementById("battery");

const saveBtn = document.getElementById("saveBtn");
const lastSaved = document.getElementById("lastSaved");


// 📥 LOAD DROPDOWN
code.innerHTML = `<option value="">Select Class</option>`;

for(let c in classData){
code.innerHTML += `<option value="${c}">
${c} - ${classData[c].name}
</option>`;
}


// 🔥 LOAD CLASS
function loadClass(c){

if(!classData[c]) return;

let d = classData[c];

title.innerText = c + " - " + d.name;

strength.value = d.strength;
benches.value = d.benches;

advisor.value = d.advisor;
mentor.value = d.mentor;

let saved = JSON.parse(localStorage.getItem(c));

if(saved){
status.value = saved.status || "Available";
cpu.value = saved.cpu || "Working";
projector.value = saved.projector || "Working";
battery.value = saved.battery || "Working";

lastSaved.innerText = "Last Saved: " + saved.time;

}else{

status.value="Available";
cpu.value="Working";
projector.value="Working";
battery.value="Working";

lastSaved.innerText = "Last Saved: ---";
}
}


// 🔁 CHANGE
code.addEventListener("change", function(){
loadClass(this.value);
});


// 🚀 AUTO LOAD
let firstClass = Object.keys(classData)[0];
code.value = firstClass;
loadClass(firstClass);


// 🔒 ROLE CONTROL
if(role === "Student"){

document.querySelectorAll("input, select, textarea").forEach(el=>{
if(el.id !== "code") el.disabled = true;
});

saveBtn.style.display = "none";

}else{

strength.disabled = true;
benches.disabled = true;
advisor.disabled = true;
mentor.disabled = true;

}


// 💾 SAVE
function saveData(){

if(role === "Student"){
alert("❌ No permission");
return;
}

let c = code.value;

let now = new Date();

let data = {
status: status.value,
cpu: cpu.value,
projector: projector.value,
battery: battery.value,
time: now.toLocaleString()
};

localStorage.setItem(c, JSON.stringify(data));

lastSaved.innerText =
"Last Saved: " + data.time;

alert("✅ Saved Successfully");

}


// SAVE BUTTON
saveBtn.addEventListener("click", saveData);


// 🔴 LOGOUT

logoutBtn.style.background = "#d9534f";
logoutBtn.style.color = "white";
logoutBtn.style.border = "none";
logoutBtn.style.borderRadius = "6px";
logoutBtn.style.fontSize = "12px";
logoutBtn.style.cursor = "pointer";

document.body.appendChild(logoutBtn);

logoutBtn.onclick = function(){
localStorage.clear();
window.location.href = "about:blank";
};
