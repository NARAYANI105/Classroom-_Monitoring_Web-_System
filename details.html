<!DOCTYPE html>
<html>
<head>
<title>Classroom Details</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Segoe UI';}

body{
background:linear-gradient(135deg,#1d2671,#c33764);
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
}

.container{
background:#fff;
padding:25px;
border-radius:15px;
width:90%;
max-width:900px;
box-shadow:0 10px 25px rgba(0,0,0,0.3);
}

h2{text-align:center;margin-bottom:20px;}

.grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:20px;
}

@media(max-width:600px){
.grid{grid-template-columns:1fr;}
}

label{font-weight:bold;margin-top:10px;display:block;}

input,select{
width:100%;
padding:10px;
margin-top:5px;
border:1px solid #ccc;
border-radius:8px;
}

button{
width:100%;
padding:12px;
margin-top:20px;
background:#6a11cb;
color:#fff;
border:none;
border-radius:10px;
cursor:pointer;
}

.readonly{
background:#eee;
cursor:not-allowed;
}
</style>
</head>

<body>

<div class="container">

<h2 id="title">Classroom Details</h2>

<div class="grid">

<!-- LEFT -->
<div>
<label>Class Code</label>
<input id="code">

<label>Class Name</label>
<input id="className">

<label>Start Time</label>
<input type="time" id="start">

<label>Status</label>
<select id="status">
<option>Available</option>
<option>Occupied</option>
</select>

<label>CPU</label>
<select id="cpu">
<option>Working</option>
<option>Not Working</option>
</select>

<label>Total Benches</label>
<input id="benches" class="readonly" readonly>
</div>

<!-- RIGHT -->
<div>
<label>Faculty</label>
<input id="faculty">

<label>End Time</label>
<input type="time" id="end">

<label>Projector</label>
<select id="projector">
<option>Working</option>
<option>Not Working</option>
</select>

<label>Student Strength</label>
<input id="strength" class="readonly" readonly>

<label>Purchase Date</label>
<input type="date" id="purchaseDate">

<label>Replace Date</label>
<input type="date" id="replaceDate">
</div>

</div>

<button onclick="saveData()" id="saveBtn">SAVE</button>

</div>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

<script>

// 🔥 Firebase
const firebaseConfig = {
apiKey: "YOUR_KEY",
authDomain: "YOUR_DOMAIN",
databaseURL: "YOUR_DB_URL",
projectId: "YOUR_ID"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();


// 🔐 ROLE
let role = localStorage.getItem("role") || "student";

window.onload = function(){
if(role === "student"){
document.querySelectorAll("input, select").forEach(el=>el.disabled=true);
document.getElementById("saveBtn").style.display="none";
}
};


// 🧠 CLASS MAP
const classMap = {
"A1L03":"First Year CSE B",
"A1L04":"First Year AIML",
"A2L05":"First Year MECH",
"A2L04":"First Year CSE A",
"B1L05":"First Year EEE",
"B1L04":"First Year CIVIL"
};


// 🔄 LOAD
code.addEventListener("change", function(){

let c = this.value.toUpperCase();
this.value = c;

if(classMap[c]){
className.value = classMap[c];
title.innerText = c + " - " + classMap[c];
}

db.ref("classrooms/" + c).on("value", snap=>{
let d = snap.val();

if(d){
className.value = d.className;
faculty.value = d.faculty;
start.value = d.start;
end.value = d.end;
status.value = d.status;
projector.value = d.projector;
cpu.value = d.cpu;

// 🔒 AUTO LOAD ONLY (NO EDIT)
benches.value = d.benches;
strength.value = d.strength;

purchaseDate.value = d.purchaseDate;
replaceDate.value = d.replaceDate;

title.innerText = c + " - " + d.className;
}
});

});


// 💾 SAVE
function saveData(){

if(role === "student"){
alert("Students cannot edit ❌");
return;
}

let c = code.value;

let obj = {
fullName: c + " - " + className.value,
className: className.value,
faculty: faculty.value,
start: start.value,
end: end.value,
status: status.value,
projector: projector.value,
cpu: cpu.value,

// 🚫 NOT EDITABLE BUT SAVED (KEEP OLD VALUE)
benches: benches.value,
strength: strength.value,

purchaseDate: purchaseDate.value,
replaceDate: replaceDate.value
};

db.ref("classrooms/" + c).set(obj);

alert("Saved ✅");
}

</script>

</body>
</html>
