<!DOCTYPE html>
<html>
<head>
<title>Classroom Details</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Segoe UI', sans-serif;
}

body{
min-height:100vh;
background: linear-gradient(135deg,#1d2671,#c33764);
display:flex;
justify-content:center;
align-items:center;
padding:20px;
}

.container{
width:90%;
max-width:800px;
background:#fff;
padding:25px;
border-radius:15px;
box-shadow:0 10px 30px rgba(0,0,0,0.3);
}

h2{
text-align:center;
margin-bottom:20px;
}

.form-grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:20px;
}

@media(max-width:600px){
.form-grid{
grid-template-columns:1fr;
}
}

label{
display:block;
margin-top:10px;
font-weight:bold;
}

input, select{
width:100%;
padding:10px;
margin-top:5px;
border:1px solid #ccc;
border-radius:8px;
}

button{
width:100%;
padding:12px;
margin-top:20px;
background:#6a11cb;
color:white;
border:none;
border-radius:10px;
font-size:16px;
cursor:pointer;
}

button:hover{
background:#2575fc;
}
</style>

</head>

<body>

<div class="container">

<h2>Classroom Details</h2>

<div class="form-grid">

<!-- LEFT -->
<div>

<label>Class Code</label>
<input type="text" id="code" placeholder="A1L03">

<label>Class Name</label>
<input type="text" id="className">

<label>Start Time</label>
<input type="time" id="start">

<label>Status</label>
<select id="status">
<option>Available</option>
<option>Occupied</option>
</select>

<label>CPU</label>
<select id="cpu">
<option>Working</option>
<option>Not Working</option>
</select>

<label>Battery</label>
<select id="battery">
<option>Working</option>
<option>Not Working</option>
</select>

</div>

<!-- RIGHT -->
<div>

<label>Faculty Name</label>
<input type="text" id="faculty">

<label>End Time</label>
<input type="time" id="end">

<label>Projector</label>
<select id="projector">
<option>Working</option>
<option>Not Working</option>
</select>

<label>Student Strength</label>
<input type="number" id="strength">

<label>Monitor Service Date</label>
<input type="date" id="serviceDate">

<label>Next Service Date</label>
<input type="date" id="nextService">

</div>

</div>

<button onclick="saveData()" id="saveBtn">SAVE</button>

</div>

<!-- FIREBASE -->
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

<script>

// 🔥 Firebase Config
const firebaseConfig = {
  apiKey: "AIzaSyCy6M3AZwwLyt3n8x8lXp7Ku7Do4TXeBf0",
  authDomain: "classroom-monitoring-sys-dd1cc.firebaseapp.com",
  databaseURL: "https://classroom-monitoring-sys-dd1cc-default-rtdb.firebaseio.com/",
  projectId: "classroom-monitoring-sys-dd1cc",
  storageBucket: "classroom-monitoring-sys-dd1cc.firebasestorage.app",
  messagingSenderId: "11335384409",
  appId: "1:11335384409:web:cd78c74f1acaf4c576e048"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();


// ✅ ROLE FROM LOGIN PAGE
let role = localStorage.getItem("role");

// 🔒 STUDENT LOCK
window.onload = function(){
if(role === "student"){
document.querySelectorAll("input, select").forEach(el=>el.disabled=true);
document.getElementById("saveBtn").style.display="none";
}
};


// 🧠 CLASS CODE → NAME MAP
const classMap = {
"A1L03": "First Year CSE B",
"A1L04": "First Year AIML",
"A2L05": "First Year MECH",
"A2L04": "First Year CSE A",
"B1L05": "First Year EEE",
"B1L04": "First Year CIVIL"
};


// 🔄 AUTO FILL CLASS NAME
document.getElementById("code").addEventListener("change", function(){

let code = this.value.toUpperCase();
this.value = code;

if(classMap[code]){
className.value = classMap[code];
}

// LOAD DATA ALSO
db.ref("classrooms/" + code).on("value", (snapshot)=>{
let data = snapshot.val();

if(data){
className.value = data.className;
faculty.value = data.faculty;
start.value = data.start;
end.value = data.end;
status.value = data.status;
projector.value = data.projector;
cpu.value = data.cpu;
battery.value = data.battery;
strength.value = data.strength;
serviceDate.value = data.serviceDate;
nextService.value = data.nextService;
}
});

});


// 💾 SAVE DATA
function saveData(){

let code = document.getElementById("code").value;

let obj = {
code: code,
fullName: code + " - " + className.value,
className: className.value,
faculty: faculty.value,
start: start.value,
end: end.value,
status: status.value,
projector: projector.value,
cpu: cpu.value,
battery: battery.value,
strength: strength.value,
serviceDate: serviceDate.value,
nextService: nextService.value
};

db.ref("classrooms/" + code).set(obj);

alert("Saved Successfully ✅");

}


// 🧠 AUTO NEXT SERVICE DATE
document.getElementById("serviceDate").addEventListener("change", function(){

let d = new Date(this.value);
d.setDate(d.getDate()+30);

nextService.value = d.toISOString().split('T')[0];

});

</script>

</body>
</html>
