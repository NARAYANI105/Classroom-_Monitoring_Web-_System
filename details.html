<!DOCTYPE html>
<html>
<head>
<title>Details</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="details-box">

<h2>Classroom Details</h2>

<label>Student Strength</label>
<input type="number" id="students" readonly>

<label>Bench Available</label>
<input type="number" id="benches" readonly>

<label>Classroom Status</label>
<select id="status">
<option>Occupied</option>
<option>Free</option>
</select>

<label>Current Class</label>
<input type="text" id="className">

<label>Faculty</label>
<input type="text" id="faculty">

<label>Start Time</label>
<input type="time" id="start">

<label>End Time</label>
<input type="time" id="end">

<label>Projector</label>
<select id="projector">
<option>Working</option>
<option>Not Working</option>
</select>

<label>CPU</label>
<select id="cpu">
<option>Working</option>
<option>Not Working</option>
</select>

<button onclick="saveData()">Save</button>

</div>

<script>

/* DATA */
const data={
"A1L03":{students:63,benches:32},
"A1L04":{students:63,benches:32}
};

/* GET CLASS */
let params=new URLSearchParams(window.location.search);
let classFull=params.get("class");
let role=params.get("role");
let code=classFull.split(" ")[0];

/* AUTO FILL */
document.getElementById("students").value=data[code].students;
document.getElementById("benches").value=data[code].benches;

/* ROLE CONTROL */
if(role==="student"){
document.querySelectorAll("input,select,button").forEach(el=>el.disabled=true);
}

/* LOAD SAVED */
let saved=JSON.parse(localStorage.getItem(code));
if(saved){
document.getElementById("status").value=saved.status;
document.getElementById("className").value=saved.className;
document.getElementById("faculty").value=saved.faculty;
}

/* SAVE */
function saveData(){

let obj={
status:status.value,
className:className.value,
faculty:faculty.value
};

localStorage.setItem(code,JSON.stringify(obj));
alert("Saved");

}

</script>

</body>
</html>
