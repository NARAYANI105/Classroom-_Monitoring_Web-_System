<!DOCTYPE html>
<html>
<head>
<title>Classroom Details</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Segoe UI', sans-serif;
}

body{
background:linear-gradient(135deg,#141E30,#243B55);
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
}

.container{
background:#ffffff;
padding:30px;
border-radius:15px;
width:90%;
max-width:950px;
box-shadow:0 15px 35px rgba(0,0,0,0.4);
}

h2{
text-align:center;
margin-bottom:20px;
color:#333;
}

.grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:25px;
}

@media(max-width:700px){
.grid{
grid-template-columns:1fr;
}
}

.box{
background:#f7f9fc;
padding:20px;
border-radius:12px;
box-shadow:0 5px 10px rgba(0,0,0,0.1);
}

label{
font-weight:600;
display:block;
margin-top:10px;
color:#444;
}

input,select{
width:100%;
padding:10px;
margin-top:5px;
border-radius:8px;
border:1px solid #ccc;
font-size:14px;
}

.readonly{
background:#eaeaea;
}

button{
width:100%;
padding:14px;
margin-top:25px;
border:none;
border-radius:10px;
background:#4e54c8;
color:white;
font-size:16px;
cursor:pointer;
}

button:hover{
background:#3b40a4;
}
</style>

</head>

<body>

<div class="container">

<h2 id="title">Classroom Details</h2>

<div class="grid">

<!-- LEFT BOX -->
<div class="box">

<label>Select Class</label>
<select id="code">
<option value="">-- Select Class --</option>

<option value="A1L03">A1L03 - First Year CSE B</option>
<option value="A1L04">A1L04 - First Year AIML</option>
<option value="A2L05">A2L05 - First Year MECH</option>
<option value="A2L04">A2L04 - First Year CSE A</option>
<option value="A2L03">A2L03 - First Year IT</option>
<option value="A2L02">A2L02 - First Year ECE B</option>
<option value="A2L01">A2L01 - First Year ECE A</option>

<option value="B0L01">B0L01 - First Year AD A</option>
<option value="B0L02">B0L02 - First Year AD B</option>
<option value="B0L03">B0L03 - First Year CSBS</option>

<option value="B1L05">B1L05 - First Year EEE</option>
<option value="B1L04">B1L04 - First Year CSE C</option>
<option value="B1L02">B1L02 - First Year Civil</option>

<option value="B3L05">B3L05 - Final Year AD A</option>
<option value="B3L04">B3L04 - Third Year CIVIL</option>
<option value="B3L03">B3L03 - Second Year CIVIL</option>
<option value="B3L02">B3L02 - Final Year CSBS</option>

<option value="C2L05">C2L05 - Second Year MECH</option>
<option value="C2L04">C2L04 - Third Year MECH</option>
<option value="C2L03">C2L03 - Final Year MECH</option>
<option value="C2L02">C2L02 - Third Year IT</option>
<option value="C2L01">C2L01 - Second Year IT</option>

<option value="C3L01">C3L01 - Third Year AD A</option>
<option value="C3L02">C3L02 - Third Year AD B</option>
<option value="C3L03">C3L03 - Second Year AD A</option>
<option value="C3L04">C3L04 - Second Year AD B</option>

<option value="B3R02">B3R02 - Second Year EEE</option>
<option value="B3R03">B3R03 - Third Year EEE</option>
<option value="B3R04">B3R04 - Third Year CSBS</option>
<option value="B3R05">B3R05 - Second Year CSBS</option>

<option value="C3R01">C3R01 - Second Year ECE-A</option>
<option value="C3R02">C3R02 - Second Year ECE-B</option>
<option value="C3R03">C3R03 - Third Year ECE-A</option>
<option value="C3R04">C3R04 - Third Year ECE-B</option>
<option value="C3R05">C3R05 - Final Year ECE-A</option>

<option value="C2R04">C2R04 - Second Year CSE A</option>
<option value="C2R05">C2R05 - Second Year CSE B</option>
<option value="C2R06">C2R06 - Second Year CSE C</option>

<option value="A2R02">A2R02 - Third Year CSE A</option>
<option value="A2R02A">A2R02A - Third Year CSB B</option>

</select>

<label>Start Time</label>
<input type="time" id="start">

<label>Status</label>
<select id="status">
<option>Available</option>
<option>Occupied</option>
</select>

<label>CPU</label>
<select id="cpu">
<option>Working</option>
<option>Not Working</option>
</select>

<label>Total Benches</label>
<input id="benches" class="readonly" readonly>

</div>

<!-- RIGHT BOX -->
<div class="box">

<label>Faculty</label>
<input id="faculty">

<label>End Time</label>
<input type="time" id="end">

<label>Projector</label>
<select id="projector">
<option>Working</option>
<option>Not Working</option>
</select>

<label>Student Strength</label>
<input id="strength" class="readonly" readonly>

<label>Battery</label>
<select id="battery">
<option>Working</option>
<option>Not Working</option>
</select>

<label>Purchase Date</label>
<input type="date" id="purchaseDate">

<label>Replace Date</label>
<input type="date" id="replaceDate">

<label>Monitor Service Date</label>
<input type="date" id="serviceDate">

<label>Next Service Date</label>
<input type="date" id="nextService">

</div>

</div>

<button onclick="saveData()" id="saveBtn">SAVE</button>

</div>

<script>

// ROLE CONTROL
let role = localStorage.getItem("role") || "student";

window.onload = function(){
if(role === "student"){
document.querySelectorAll("input, select").forEach(el=>el.disabled=true);
document.getElementById("saveBtn").style.display="none";
}
};

// CLASS DATA
const classData = {
"A1L03":{name:"First Year CSE B",strength:63,benches:32},
"A1L04":{name:"First Year AIML",strength:63,benches:32},
"A2L05":{name:"First Year MECH",strength:30,benches:15},
"A2L04":{name:"First Year CSE A",strength:63,benches:32},
"B1L05":{name:"First Year EEE",strength:63,benches:32},
"B1L04":{name:"First Year CSE C",strength:63,benches:32}
};

// AUTO FILL
document.getElementById("code").addEventListener("change",function(){

let c=this.value;

if(classData[c]){
let d=classData[c];

document.getElementById("title").innerText=c+" - "+d.name;
document.getElementById("strength").value=d.strength;
document.getElementById("benches").value=d.benches;
}

});

function saveData(){
if(role==="student"){
alert("Students cannot edit ❌");
return;
}
alert("Saved Successfully ✅");
}

</script>

</body>
</html>
