<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Classroom Details</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:'Segoe UI',sans-serif;
    background:linear-gradient(135deg,#667eea,#764ba2);
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    padding:30px;
}

.container{
    width:1100px;
    background:white;
    border-radius:15px;
    padding:30px;
    box-shadow:0 10px 25px rgba(0,0,0,0.2);
}

h2{
    text-align:center;
    margin-bottom:25px;
    color:#333;
}

.grid{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:30px;
}

.column{
    display:flex;
    flex-direction:column;
}

label{
    font-size:15px;
    font-weight:600;
    margin-bottom:8px;
    margin-top:15px;
}

input,select{
    width:100%;
    padding:12px;
    border-radius:8px;
    border:1px solid #ccc;
    font-size:15px;
}

.readonly{
    background:#ececec;
}

button{
    width:100%;
    margin-top:30px;
    padding:14px;
    border:none;
    border-radius:10px;
    background:#6a11cb;
    color:white;
    font-size:18px;
    cursor:pointer;
}

button:hover{
    background:#4f0f99;
}

#lastSaved{
    margin-top:15px;
    text-align:center;
    color:#444;
    font-size:14px;
}

@media(max-width:900px){

.grid{
    grid-template-columns:1fr;
}

.container{
    width:100%;
}

}

</style>
</head>

<body>

<div class="container">

<h2 id="title">Classroom Details</h2>

<div class="grid">

<!-- LEFT SIDE -->

<div class="column">

<label>Class</label>
<select id="code"></select>

<label>CPU Status</label>
<select id="cpu">
<option>Working</option>
<option>Not Working</option>
</select>

<label>Projector Status</label>
<select id="projector">
<option>Working</option>
<option>Not Working</option>
</select>

<label>Battery Status</label>
<select id="battery">
<option>Working</option>
<option>Not Working</option>
</select>

<label>Student Strength</label>
<input type="text" id="strength" class="readonly" readonly>

<label>Total Benches</label>
<input type="text" id="benches" class="readonly" readonly>

<label>Status</label>
<select id="status">
<option>Available</option>
<option>Occupied</option>
</select>

</div>

<!-- RIGHT SIDE -->

<div class="column">

<label>Class Advisor</label>
<input type="text" id="classAdvisor" class="readonly" readonly>

<label>Class Advisor Mail</label>
<input type="text" id="classAdvisorMail" class="readonly" readonly>

<label>Mentor 1</label>
<input type="text" id="mentor1" class="readonly" readonly>

<label>Mentor 1 Mail</label>
<input type="text" id="mentor1mail" class="readonly" readonly>

<label>Mentor 2</label>
<input type="text" id="mentor2" class="readonly" readonly>

<label>Mentor 2 Mail</label>
<input type="text" id="mentor2mail" class="readonly" readonly>

<label>Mentor 3</label>
<input type="text" id="mentor3" class="readonly" readonly>

<label>Mentor 3 Mail</label>
<input type="text" id="mentor3mail" class="readonly" readonly>

</div>

</div>

<button id="saveBtn">Save</button>

<div id="lastSaved">Last Saved : ---</div>

</div>

const code = document.getElementById("code");

for(let key in classData){

    let option = document.createElement("option");

    option.value = key;
    option.textContent = key;

    code.appendChild(option);
}

function loadClassData(){

    let selected = code.value;

    let data = classData[selected];

    document.getElementById("title").innerText = selected + " Classroom Details";

    document.getElementById("strength").value = data.strength;
    document.getElementById("benches").value = data.benches;

    document.getElementById("classAdvisor").value = data.classAdvisor;
    document.getElementById("classAdvisorMail").value = data.classAdvisorMail;

    document.getElementById("mentor1").value = data.mentor1;
    document.getElementById("mentor1mail").value = data.mentor1mail;

    document.getElementById("mentor2").value = data.mentor2;
    document.getElementById("mentor2mail").value = data.mentor2mail;

    document.getElementById("mentor3").value = data.mentor3;
    document.getElementById("mentor3mail").value = data.mentor3mail;
}

code.addEventListener("change",loadClassData);

loadClassData();

document.getElementById("saveBtn").addEventListener("click",()=>{

    let now = new Date();

    document.getElementById("lastSaved").innerText =
    "Last Saved : " + now.toLocaleString();

    alert("Saved Successfully");

});

</script>

</body>
</html>
