<!DOCTYPE html>
<html>
<head>
<title>Classroom Details</title>

<style>

body{
font-family: 'Segoe UI', sans-serif;
background: linear-gradient(135deg,#667eea,#764ba2);
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
margin:0;
}

.container{
background:#fff;
padding:25px;
border-radius:12px;
width:750px;
box-shadow:0 10px 25px rgba(0,0,0,0.2);
}

h2{
text-align:center;
margin-bottom:20px;
}

.grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:25px;
}

.column{
display:flex;
flex-direction:column;
}

label{
font-weight:600;
margin-top:10px;
}

input,select{
padding:8px;
margin-top:5px;
border-radius:6px;
border:1px solid #ccc;
}

.readonly{
background:#eaeaea;
}

button{
margin-top:20px;
width:100%;
padding:12px;
border:none;
border-radius:8px;
background:#6a11cb;
color:#fff;
font-size:16px;
cursor:pointer;
}

button:hover{
background:#2575fc;
}

#lastSaved{
margin-top:15px;
font-size:14px;
color:#555;
text-align:center;
}

</style>
</head>

<body>

<div class="container">

<h2 id="title">Classroom Details</h2>

<div class="grid">

<!-- LEFT -->
<div class="column">

<label>Class</label>
<select id="code"></select>

<label>Student Strength</label>
<input id="strength" class="readonly" readonly>

<label>Total Benches</label>
<input id="benches" class="readonly" readonly>

<label>Faculty</label>
<input id="faculty">

<label>Start Time</label>
<input type="time" id="start">

<label>End Time</label>
<input type="time" id="end">

<label>Status</label>
<select id="status">
<option>Available</option>
<option>Occupied</option>
</select>

</div>

<!-- RIGHT -->
<div class="column">

<label>CPU</label>
<select id="cpu">
<option>Working</option>
<option>Not Working</option>
</select>

<label>Projector</label>
<select id="projector">
<option>Working</option>
<option>Not Working</option>
</select>

<label>Battery</label>
<select id="battery">
<option>Working</option>
<option>Not Working</option>
</select>

</div>

</div>

<button id="saveBtn">Save</button>

<p id="lastSaved">Last Saved: --</p>

</div>

<script src="script.js"></script>

</body>
</html>
