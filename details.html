<!DOCTYPE html>
<html>
<head>
<title>Classroom Details</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="details-box">

<h2>Classroom Details</h2>

<label>Classroom Status</label>
<select>
<option>Free</option>
<option>Occupied</option>
</select>

<label>Current Class</label>
<input type="text">

<label>Faculty Name</label>
<input type="text">

<label>Start Time</label>
<input type="time">

<label>End Time</label>
<input type="time">

<hr>

<label>Total Benches</label>
<input type="number">

<label>Projector</label>
<select>
<option>Working</option>
<option>Not Working</option>
</select>

<label>CPU</label>
<select>
<option>Working</option>
<option>Not Working</option>
</select>

<label>Battery Purchase Date</label>
<input type="date">

<label>Battery Replace Date</label>
<input type="date">

<label>Last Service Date</label>
<input type="date">

<label>Next Service Date</label>
<input type="date">

<button>Save</button>

</div>

</body>
</html>
