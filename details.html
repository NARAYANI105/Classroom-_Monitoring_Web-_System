<!DOCTYPE html>
<html>
<head>
<title>Classroom Details</title>

<link rel="stylesheet" href="style.css">

<style>
body{
background:#eef2f7;
font-family:Arial;
}

.box{
width:350px;
margin:40px auto;
background:white;
padding:20px;
border-radius:10px;
box-shadow:0 0 10px rgba(0,0,0,0.2);
}

h2{
text-align:center;
margin-bottom:20px;
}

label{
font-weight:bold;
margin-top:10px;
display:block;
}

input,select{
width:100%;
padding:8px;
margin-top:5px;
border-radius:5px;
border:1px solid #ccc;
}

button{
width:100%;
padding:10px;
margin-top:15px;
background:green;
color:white;
border:none;
border-radius:5px;
}

</style>
</head>

<body>

<div class="box">

<h2 id="title"></h2>

<label>Student Strength</label>
<input type="number" id="students" readonly>

<label>Total Benches</label>
<input type="number" id="benches" readonly>

<label>Projector</label>
<select id="projector">
<option>Working</option>
<option>Not Working</option>
</select>

<label>CPU</label>
<select id="cpu">
<option>Working</option>
<option>Not Working</option>
</select>

<label>Battery Purchase Date</label>
<input type="date" id="purchase">

<label>Battery Replace Date</label>
<input type="date" id="replace">

<label>Last Service Date</label>
<input type="date" id="last">

<label>Next Service Date</label>
<input type="date" id="next">

<button onclick="saveData()">Save</button>

</div>

<script>

/* CLASS DATA */
const data = {
"A1L03": {students:63, benches:32},
"A1L04": {students:63, benches:32}
};

/* GET CLASS */
const params = new URLSearchParams(window.location.search);
const fullClass = params.get("class");

/* SET TITLE */
document.getElementById("title").innerText = fullClass;

/* GET CODE */
let code = fullClass.split(" ")[0];

/* AUTO FILL */
if(data[code]){
document.getElementById("students").value = data[code].students;
document.getElementById("benches").value = data[code].benches;
}

/* LOAD SAVED */
let saved = JSON.parse(localStorage.getItem(code));

if(saved){
projector.value = saved.projector;
cpu.value = saved.cpu;
purchase.value = saved.purchase;
replace.value = saved.replace;
last.value = saved.last;
next.value = saved.next;
}

/* SAVE */
function saveData(){

let obj = {
projector: projector.value,
cpu: cpu.value,
purchase: purchase.value,
replace: replace.value,
last: last.value,
next: next.value
};

localStorage.setItem(code, JSON.stringify(obj));

alert("Saved Successfully!");

}

</script>

</body>
</html>
