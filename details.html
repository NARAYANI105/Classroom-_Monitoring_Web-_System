<!DOCTYPE html>
<html>
<head>
<title>Classroom Details</title>

<style>
body{
font-family:Segoe UI;
background:linear-gradient(135deg,#1e3c72,#2a5298);
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
}

.container{
background:#fff;
padding:25px;
border-radius:12px;
width:900px;
box-shadow:0 10px 30px rgba(0,0,0,0.3);
}

h2{text-align:center;margin-bottom:20px;}

.grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:20px;
}

.box{
background:#f4f6f9;
padding:15px;
border-radius:10px;
}

label{font-weight:bold;margin-top:10px;display:block;}

input,select{
width:100%;
padding:8px;
margin-top:5px;
border-radius:6px;
border:1px solid #ccc;
}

.readonly{background:#e0e0e0;}

button{
margin-top:20px;
width:100%;
padding:12px;
background:#2a5298;
color:#fff;
border:none;
border-radius:8px;
}
</style>

</head>
