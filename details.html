<!DOCTYPE html>
<html>
<head>
<title>Classroom Details</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<h1>Classroom Details</h1>

<div class="form-box">

<h2>Equipment Details</h2>

<label>Total Benches</label>
<input type="number" placeholder="Enter total benches">

<label>Projector Working</label>
<select>
<option>Working</option>
<option>Not Working</option>
</select>

<label>CPU Working</label>
<select>
<option>Working</option>
<option>Not Working</option>
</select>

<label>Battery Purchase Date</label>
<input type="date">

<label>Battery Replace Date</label>
<input type="date">

<label>Last Service Date</label>
<input type="date">

<label>Next Service Date</label>
<input type="date">


<h2>Classroom Availability</h2>

<label>Classroom Status</label>
<select>
<option>Free</option>
<option>Occupied</option>
</select>

<label>Current Class / Activity</label>
<input type="text" placeholder="Enter subject or activity">

<label>Faculty Name</label>
<input type="text" placeholder="Enter faculty name">

<label>Start Time</label>
<input type="time">

<label>End Time</label>
<input type="time">

<button>Save</button>

</div>

</body>
</html>
