<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Classroom Details</title>

<style>

body{
    font-family:'Segoe UI',sans-serif;
    background:linear-gradient(135deg,#667eea,#764ba2);
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
    margin:0;
}

.container{
    background:#fff;
    padding:25px;
    border-radius:12px;
    width:850px;
    box-shadow:0 10px 25px rgba(0,0,0,0.2);
}

h2{
    text-align:center;
    margin-bottom:20px;
}

.grid{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:25px;
}

.column{
    display:flex;
    flex-direction:column;
}

label{
    font-weight:600;
    margin-top:10px;
}

input,select{
    padding:8px;
    margin-top:5px;
    border-radius:6px;
    border:1px solid #ccc;
}

.readonly{
    background:#eaeaea;
}

button{
    margin-top:20px;
    width:100%;
    padding:12px;
    border:none;
    border-radius:8px;
    background:#6a11cb;
    color:#fff;
    font-size:16px;
    cursor:pointer;
}

button:hover{
    background:#4d0ea1;
}

#lastSaved{
    text-align:center;
    margin-top:10px;
    font-size:14px;
    color:#444;
}

</style>
</head>

<body>

<div class="container">

<h2 id="title">Classroom Details</h2>

<div class="grid">

<!-- LEFT SIDE -->
<div class="column">

<label>Class</label>
<select id="code"></select>

<label>Student Strength</label>
<input id="strength" class="readonly" readonly>

<label>Total Benches</label>
<input id="benches" class="readonly" readonly>

<label>Class Advisor</label>
<input id="classAdvisor" class="readonly" readonly>

<label>Class Advisor Mail</label>
<input id="classAdvisorMail" class="readonly" readonly>

<label>Status</label>
<select id="status">
<option>Available</option>
<option>Occupied</option>
</select>

</div>

<!-- RIGHT SIDE -->
<div class="column">

<label>CPU</label>
<select id="cpu">
<option>Working</option>
<option>Not Working</option>
</select>

<label>Projector</label>
<select id="projector">
<option>Working</option>
<option>Not Working</option>
</select>

<label>Battery</label>
<select id="battery">
<option>Working</option>
<option>Not Working</option>
</select>

<label>Mentor 1</label>
<input id="mentor1" class="readonly" readonly>

<label>Mentor 1 Mail</label>
<input id="mentor1mail" class="readonly" readonly>

<label>Mentor 2</label>
<input id="mentor2" class="readonly" readonly>

<label>Mentor 2 Mail</label>
<input id="mentor2mail" class="readonly" readonly>

<label>Mentor 3</label>
<input id="mentor3" class="readonly" readonly>

<label>Mentor 3 Mail</label>
<input id="mentor3mail" class="readonly" readonly>

</div>

</div>

<button id="saveBtn">Save</button>

<div id="lastSaved">Last Saved: ---</div>

</div>

function loadClassData(){

    let selected=code.value;

    let data=classData[selected];

    document.getElementById("title").innerText=selected;

    document.getElementById("strength").value=data.strength;
    document.getElementById("benches").value=data.benches;

    document.getElementById("classAdvisor").value=data.classAdvisor;
    document.getElementById("classAdvisorMail").value=data.classAdvisorMail;

    document.getElementById("mentor1").value=data.mentor1;
    document.getElementById("mentor1mail").value=data.mentor1mail;

    document.getElementById("mentor2").value=data.mentor2;
    document.getElementById("mentor2mail").value=data.mentor2mail;

    document.getElementById("mentor3").value=data.mentor3;
    document.getElementById("mentor3mail").value=data.mentor3mail;
}

code.addEventListener("change",loadClassData);

loadClassData();

document.getElementById("saveBtn").addEventListener("click",()=>{

    let now=new Date();

    document.getElementById("lastSaved").innerText=
    "Last Saved : "+now.toLocaleString();

    alert("Saved Successfully");

});

</script>
