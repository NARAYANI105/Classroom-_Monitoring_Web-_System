<!DOCTYPE html>
<html>
<head>
<title>Classroom Details</title>

<link rel="stylesheet" href="style.css">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Segoe UI', sans-serif;
}

body{
height:100vh;
background: linear-gradient(135deg,#1d2671,#c33764);
display:flex;
justify-content:center;
align-items:center;
}

.container{
width:420px;
background:#fff;
padding:25px;
border-radius:15px;
box-shadow:0 10px 30px rgba(0,0,0,0.3);
}

h2{
text-align:center;
margin-bottom:20px;
}

label{
display:block;
margin-top:10px;
font-weight:bold;
}

input, select{
width:100%;
padding:10px;
margin-top:5px;
border:1px solid #ccc;
border-radius:8px;
}

button{
width:100%;
padding:12px;
margin-top:20px;
background:#6a11cb;
color:white;
border:none;
border-radius:10px;
font-size:16px;
cursor:pointer;
}

button:hover{
background:#2575fc;
}

</style>

</head>

<body>

<div class="container">

<h2>Classroom Details</h2>

<label>Class Code</label>
<input type="text" id="code" placeholder="A1L03">

<label>Class Name</label>
<input type="text" id="className">

<label>Faculty Name</label>
<input type="text" id="faculty">

<label>Start Time</label>
<input type="time" id="start">

<label>End Time</label>
<input type="time" id="end">

<label>Status</label>
<select id="status">
<option>Available</option>
<option>Occupied</option>
</select>

<label>Projector</label>
<select id="projector">
<option>Working</option>
<option>Not Working</option>
</select>

<label>CPU</label>
<select id="cpu">
<option>Working</option>
<option>Not Working</option>
</select>

<button onclick="saveData()">SAVE</button>

</div>

<!-- FIREBASE -->
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

<script>

// 🔥 YOUR FIREBASE CONFIG
const firebaseConfig = {
  apiKey: "AIzaSyCy6M3AZwwLyt3n8x8lXp7Ku7Do4TXeBf0",
  authDomain: "classroom-monitoring-sys-dd1cc.firebaseapp.com",
  databaseURL: "https://classroom-monitoring-sys-dd1cc-default-rtdb.firebaseio.com/",
  projectId: "classroom-monitoring-sys-dd1cc",
  storageBucket: "classroom-monitoring-sys-dd1cc.firebasestorage.app",
  messagingSenderId: "11335384409",
  appId: "1:11335384409:web:cd78c74f1acaf4c576e048"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();


// 🔐 ROLE (from login page)
let role = localStorage.getItem("role");

// ❗ fallback (if no login)
if(!role){
role = prompt("Enter role: admin / staff / student");
}


// 🔒 STUDENT LOCK
window.onload = function(){

if(role === "student"){

document.querySelectorAll("input, select").forEach(el=>{
el.disabled = true;
});

document.querySelector("button").style.display = "none";

}

};


// 💾 SAVE DATA
function saveData(){

let code = document.getElementById("code").value;

let obj = {
className: className.value,
faculty: faculty.value,
start: start.value,
end: end.value,
status: status.value,
projector: projector.value,
cpu: cpu.value
};

db.ref("classrooms/" + code).set(obj);

alert("Saved Successfully ✅");

}


// 🔄 LOAD DATA
document.getElementById("code").addEventListener("change", function(){

let code = this.value;

db.ref("classrooms/" + code).on("value", (snapshot)=>{
let data = snapshot.val();

if(data){
className.value = data.className;
faculty.value = data.faculty;
start.value = data.start;
end.value = data.end;
status.value = data.status;
projector.value = data.projector;
cpu.value = data.cpu;
}
});

});

</script>

</body>
</html>
