<!DOCTYPE html>
<html>
<head>
<title>Classroom Details</title>

<style>
body{
font-family: Arial;
padding:20px;
}

input, select{
display:block;
margin:8px 0;
padding:6px;
width:250px;
}

/* 🔒 readonly style */
.readonly-style{
background:#e0e0e0 !important;
color:#555;
cursor:not-allowed;
border:1px solid #aaa;
}

button{
margin-top:10px;
padding:8px 15px;
}
</style>

</head>

<body>

<h2 id="title">Class Details</h2>

<label>Class Code</label>
<select id="code"></select>

<label>Strength</label>
<input type="text" id="strength">

<label>Benches</label>
<input type="text" id="benches">

<label>Faculty</label>
<input type="text" id="faculty">

<label>Start Time</label>
<input type="time" id="start">

<label>End Time</label>
<input type="time" id="end">

<label>Status</label>
<select id="status">
<option>Available</option>
<option>Occupied</option>
</select>

<label>CPU</label>
<select id="cpu">
<option>Working</option>
<option>Not Working</option>
</select>

<label>Projector</label>
<select id="projector">
<option>Working</option>
<option>Not Working</option>
</select>

<label>Battery</label>
<select id="battery">
<option>Working</option>
<option>Not Working</option>
</select>

<label>Purchase Date</label>
<input type="date" id="purchase">

<label>Replace Date</label>
<input type="date" id="replace">

<label>Service Date</label>
<input type="date" id="service">

<label>Next Service</label>
<input type="date" id="next">

<button onclick="saveData()">Save</button>

<script src="script.js"></script>

</body>
</html>
