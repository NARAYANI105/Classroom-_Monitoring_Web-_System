<!DOCTYPE html>
<html>
<head>
<title>Login</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="login-box">

<h2>Login</h2>

<label>Login ID</label>
<input type="text" id="loginid" placeholder="Example: 9536XXXXXXXX@ritrjpm.ac.in">

<label>Password</label>
<input type="password" id="password" placeholder="Enter Password">

<button onclick="checkLogin()">Login</button>

</div>

<script>

function checkLogin(){

let id = document.getElementById("loginid").value;
let pass = document.getElementById("password").value;

/* 9536 + 8 digits + @ritrjpm.ac.in */
let pattern = /^9536[0-9]{8}@ritrjpm\.ac\.in$/;

if(pattern.test(id) && pass === "RIT")
{
window.location.href="side.html";
}
else
{
alert("Invalid Login! ID must start with 9536, contain 12 digits, and end with @ritrjpm.ac.in. Password is RIT.");
}

}

</script>

</body>
</html>
