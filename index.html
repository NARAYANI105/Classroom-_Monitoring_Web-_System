<!DOCTYPE html>
<html>
<head>
<title>Login</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="main-container">

<div class="login-card">

<h2>Classroom Monitoring System</h2>

<input type="text" id="loginid" placeholder="Enter Login ID">

<input type="password" id="password" placeholder="Enter Password">

<p id="error-msg"></p>

<div class="btn-group">
<button onclick="checkLogin('student')">Student</button>
<button onclick="checkLogin('staff')">Staff</button>
<button onclick="checkLogin('admin')">Admin</button>
</div>

</div>

</div>

<script>

function checkLogin(type){

let id = document.getElementById("loginid").value.trim();
let pass = document.getElementById("password").value.trim();
let error = document.getElementById("error-msg");

error.innerHTML = "";

/* PATTERNS */
let studentPattern = /^9536[0-9]{8}@ritrjpm\.ac\.in$/;
let staffPattern = /^[a-zA-Z0-9]+@ritrjpm\.ac\.in$/;

/* STUDENT */
if(type === "student"){

    if(!studentPattern.test(id)){
        error.innerHTML = "Invalid Student ID";
        return;
    }

    if(pass !== "RIT"){
        error.innerHTML = "Incorrect Password";
        return;
    }
}

/* STAFF */
else if(type === "staff"){

    if(!staffPattern.test(id) || id.startsWith("9536")){
        error.innerHTML = "Invalid Staff ID";
        return;
    }

    if(pass !== "STAFF.RIT"){
        error.innerHTML = "Incorrect Password";
        return;
    }
}

/* ADMIN */
else if(type === "admin"){

    if(!staffPattern.test(id) || id.startsWith("9536")){
        error.innerHTML = "Invalid Admin ID";
        return;
    }

    if(pass !== "ADMIN.RIT"){
        error.innerHTML = "Incorrect Password";
        return;
    }
}

/* SUCCESS */
window.location.href = "side.html";

}

</script>

</body>
</html>
