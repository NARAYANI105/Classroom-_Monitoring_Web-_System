<!DOCTYPE html>
<html>
<head>
<title>Login</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="main-container">

<div class="login-card">

<h2>Classroom Monitoring</h2>

<input type="text" id="loginid" placeholder="Login ID">
<input type="password" id="password" placeholder="Password">

<p id="error-msg"></p>

<div class="btn-group">
<button onclick="checkLogin()">Student</button>
<button onclick="checkLogin()">Staff</button>
<button onclick="checkLogin()">Admin</button>
</div>

</div>

</div>

<script>
function checkLogin(){

let id = document.getElementById("loginid").value.trim();
let pass = document.getElementById("password").value.trim();
let error = document.getElementById("error-msg");

let pattern = /^9536[0-9]{8}@ritrjpm\.ac\.in$/;

error.innerHTML = "";

if(!pattern.test(id)){
    error.innerHTML = "Invalid Login ID";
    return;
}

if(pass !== "RIT"){
    error.innerHTML = "Incorrect Password";
    return;
}

window.location.href="side.html";
}
</script>

</body>
</html>
