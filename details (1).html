<!DOCTYPE html>
<html>
<head>
<title>Classroom Details</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Segoe UI', sans-serif;
}

body{
min-height:100vh;
background: linear-gradient(135deg,#1d2671,#c33764);
display:flex;
justify-content:center;
align-items:center;
padding:20px;
}

.container{
width:90%;
max-width:900px;
background:#fff;
padding:25px;
border-radius:15px;
box-shadow:0 10px 30px rgba(0,0,0,0.3);
}

h2{
text-align:center;
margin-bottom:20px;
}

.form-grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:20px;
}

@media(max-width:600px){
.form-grid{
grid-template-columns:1fr;
}
}

label{
display:block;
margin-top:10px;
font-weight:bold;
}

input, select{
width:100%;
padding:10px;
margin-top:5px;
border:1px solid #ccc;
border-radius:8px;
}

button{
width:100%;
padding:12px;
margin-top:20px;
background:#6a11cb;
color:white;
border:none;
border-radius:10px;
font-size:16px;
cursor:pointer;
}

button:hover{
background:#2575fc;
}
</style>

</head>

<body>

<div class="container">

<h2 id="title">Classroom Details</h2>

<div class="form-grid">

<div>
<label>Class Code</label>
<input type="text" id="code">

<label>Class Name</label>
<input type="text" id="className">

<label>Start Time</label>
<input type="time" id="start">

<label>Status</label>
<select id="status">
<option>Available</option>
<option>Occupied</option>
</select>

<label>CPU</label>
<select id="cpu">
<option>Working</option>
<option>Not Working</option>
</select>

<label>Battery</label>
<select id="battery">
<option>Working</option>
<option>Not Working</option>
</select>

<label>Total Benches</label>
<input type="number" id="benches">
</div>

<div>
<label>Faculty Name</label>
<input type="text" id="faculty">

<label>End Time</label>
<input type="time" id="end">

<label>Projector</label>
<select id="projector">
<option>Working</option>
<option>Not Working</option>
</select>

<label>Student Strength</label>
<input type="number" id="strength">

<label>Monitor Service Date</label>
<input type="date" id="serviceDate">

<label>Next Service Date</label>
<input type="date" id="nextService">
</div>

</div>

<button onclick="saveData()" id="saveBtn">SAVE</button>

</div>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

<script>

// 🔥 Firebase
const firebaseConfig = {
  apiKey: "YOUR_API_KEY",
  authDomain: "classroom-monitoring-sys-dd1cc.firebaseapp.com",
  databaseURL: "https://classroom-monitoring-sys-dd1cc-default-rtdb.firebaseio.com/",
  projectId: "classroom-monitoring-sys-dd1cc",
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();


// 🔐 ROLE CONTROL
let role = localStorage.getItem("role");

window.onload = function(){
if(role === "student"){
document.querySelectorAll("input, select").forEach(el=>el.disabled=true);
document.getElementById("saveBtn").style.display="none";
}
};


// 🧠 40 CLASSROOM MAP
const classMap = {

// LEFT SIDE (26)
"A1L01":"CSE A",
"A1L02":"CSE B",
"A1L03":"First Year CSE B",
"A1L04":"First Year AIML",
"A1L05":"IT",
"A1L06":"CIVIL",
"A2L01":"CSE A",
"A2L02":"CSE B",
"A2L03":"AIML",
"A2L04":"First Year CSE A",
"A2L05":"First Year MECH",
"A2L06":"EEE",
"A3L01":"MECH",
"A3L02":"CIVIL",
"A3L03":"IT",
"A3L04":"AIDS",
"A3L05":"AIML",
"A3L06":"CSE",
"A4L01":"CSE",
"A4L02":"EEE",
"A4L03":"MECH",
"A4L04":"CIVIL",
"A4L05":"IT",
"A4L06":"AIDS",
"A5L01":"LAB",
"A5L02":"LAB",

// RIGHT SIDE (14)
"B1L01":"CSE",
"B1L02":"EEE",
"B1L03":"MECH",
"B1L04":"First Year CIVIL",
"B1L05":"First Year EEE",
"B2L01":"IT",
"B2L02":"CSE",
"B2L03":"AIML",
"B2L04":"CIVIL",
"B2L05":"EEE",
"B3L01":"MECH",
"B3L02":"CSE",
"B3L03":"IT",
"B3L04":"AIDS"

};


// 🔄 AUTO LOAD
document.getElementById("code").addEventListener("change", function(){

let code = this.value.toUpperCase();
this.value = code;

if(classMap[code]){
className.value = classMap[code];
}

db.ref("classrooms/" + code).on("value", (snap)=>{
let d = snap.val();
if(d){
className.value = d.className;
faculty.value = d.faculty;
start.value = d.start;
end.value = d.end;
status.value = d.status;
projector.value = d.projector;
cpu.value = d.cpu;
battery.value = d.battery;
strength.value = d.strength;
benches.value = d.benches;
serviceDate.value = d.serviceDate;
nextService.value = d.nextService;

title.innerText = code + " - " + d.className;
}
});

});


// 💾 SAVE
function saveData(){

let code = code.value;

let obj = {
fullName: code + " - " + className.value,
className: className.value,
faculty: faculty.value,
start: start.value,
end: end.value,
status: status.value,
projector: projector.value,
cpu: cpu.value,
battery: battery.value,
strength: strength.value,
benches: benches.value,
serviceDate: serviceDate.value,
nextService: nextService.value
};

db.ref("classrooms/" + code).set(obj);
alert("Saved ✅");

}


// 📅 AUTO NEXT DATE
serviceDate.addEventListener("change", function(){
let d = new Date(this.value);
d.setDate(d.getDate()+30);
nextService.value = d.toISOString().split('T')[0];
});

</script>

</body>
</html>
