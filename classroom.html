<!DOCTYPE html>
<html>

<head>
<title>Classroom Details</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="details-container">

<h2>Classroom Information</h2>

<div class="form-group">
<label>Total Benches</label>
<input type="number">
</div>

<div class="form-group">
<label>Projector Working</label>
<select>
<option>Working</option>
<option>Not Working</option>
</select>
</div>

<div class="form-group">
<label>CPU Working</label>
<select>
<option>Working</option>
<option>Not Working</option>
</select>
</div>

<div class="form-group">
<label>Battery Purchase Date</label>
<input type="date">
</div>

<div class="form-group">
<label>Battery Replace Date</label>
<input type="date">
</div>

<div class="form-group">
<label>Last Service Date</label>
<input type="date">
</div>

<div class="form-group">
<label>Next Service Date</label>
<input type="date">
</div>

<button class="save-btn">Save</button>

</div>

</body>
</html>
