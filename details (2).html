<!DOCTYPE html>
<html>
<head>
<title>Classroom Details</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Segoe UI';}

body{
background:linear-gradient(135deg,#1d2671,#c33764);
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
}

.container{
background:#fff;
padding:25px;
border-radius:15px;
width:90%;
max-width:900px;
box-shadow:0 10px 25px rgba(0,0,0,0.3);
}

h2{text-align:center;margin-bottom:20px;}

.grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:20px;
}

@media(max-width:600px){
.grid{grid-template-columns:1fr;}
}

label{font-weight:bold;margin-top:10px;display:block;}

input,select{
width:100%;
padding:10px;
margin-top:5px;
border:1px solid #ccc;
border-radius:8px;
}

button{
width:100%;
padding:12px;
margin-top:20px;
background:#6a11cb;
color:#fff;
border:none;
border-radius:10px;
cursor:pointer;
}

.readonly{
background:#eee;
}
</style>
</head>

<body>

<div class="container">

<h2 id="title">Classroom Details</h2>

<div class="grid">

<!-- LEFT -->
<div>

<label>Class (Code + Name)</label>
<input id="code" placeholder="Enter A1L03">

<label>Start Time</label>
<input type="time" id="start">

<label>Status</label>
<select id="status">
<option>Available</option>
<option>Occupied</option>
</select>

<label>CPU</label>
<select id="cpu">
<option>Working</option>
<option>Not Working</option>
</select>

<label>Total Benches</label>
<input id="benches" readonly class="readonly">

</div>

<!-- RIGHT -->
<div>

<label>Faculty</label>
<input id="faculty">

<label>End Time</label>
<input type="time" id="end">

<label>Projector</label>
<select id="projector">
<option>Working</option>
<option>Not Working</option>
</select>

<label>Student Strength</label>
<input id="strength" readonly class="readonly">

<label>Battery</label>
<select id="battery">
<option>Working</option>
<option>Not Working</option>
</select>

<label>Purchase Date</label>
<input type="date" id="purchaseDate">

<label>Replace Date</label>
<input type="date" id="replaceDate">

<label>Monitor Service Date</label>
<input type="date" id="serviceDate">

<label>Next Service Date</label>
<input type="date" id="nextService">

</div>

</div>

<button onclick="saveData()" id="saveBtn">SAVE</button>

</div>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

<script>

// 🔥 Firebase Config
const firebaseConfig = {
apiKey: "YOUR_KEY",
authDomain: "YOUR_DOMAIN",
databaseURL: "YOUR_DB_URL",
projectId: "YOUR_ID"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();


// ✅ GET ELEMENTS
const code = document.getElementById("code");
const strength = document.getElementById("strength");
const benches = document.getElementById("benches");
const title = document.getElementById("title");

const faculty = document.getElementById("faculty");
const start = document.getElementById("start");
const end = document.getElementById("end");
const status = document.getElementById("status");
const projector = document.getElementById("projector");
const cpu = document.getElementById("cpu");

const battery = document.getElementById("battery");
const purchaseDate = document.getElementById("purchaseDate");
const replaceDate = document.getElementById("replaceDate");
const serviceDate = document.getElementById("serviceDate");
const nextService = document.getElementById("nextService");

const saveBtn = document.getElementById("saveBtn");


// 🔐 ROLE CONTROL
let role = localStorage.getItem("role") || "student";

window.onload = function(){
if(role === "student"){
document.querySelectorAll("input, select").forEach(el=>el.disabled=true);
saveBtn.style.display="none";
}
};


// 🧠 CLASS DATA
const classData = {
"A1L03": {name:"First Year CSE B", strength:63, benches:32},
"A1L04": {name:"First Year AIML", strength:63, benches:32},
"A2L05": {name:"First Year MECH", strength:30, benches:15},
"A2L04": {name:"First Year CSE A", strength:63, benches:32},
"B1L05": {name:"First Year EEE", strength:63, benches:32},
"B1L04": {name:"First Year CIVIL", strength:30, benches:25}
};


// 🔄 AUTO FILL
code.addEventListener("input", function(){

let input = this.value.toUpperCase().trim();
let c = input.includes("-") ? input.split("-")[0].trim() : input;

if(classData[c]){

let d = classData[c];

this.value = c + " - " + d.name;
title.innerText = this.value;

strength.value = d.strength;
benches.value = d.benches;

}

});


// 💾 SAVE
function saveData(){

if(role === "student"){
alert("Students cannot edit ❌");
return;
}

let full = code.value;
let c = full.split(" - ")[0];

let obj = {
fullName: full,
faculty: faculty.value,
start: start.value,
end: end.value,
status: status.value,
projector: projector.value,
cpu: cpu.value,
battery: battery.value,
strength: strength.value,
benches: benches.value,
purchaseDate: purchaseDate.value,
replaceDate: replaceDate.value,
serviceDate: serviceDate.value,
nextService: nextService.value
};

db.ref("classrooms/" + c).set(obj);

alert("Saved Successfully ✅");

}

</script>

</body>
</html>
