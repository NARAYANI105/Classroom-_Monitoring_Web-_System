<!DOCTYPE html>
<html>
<head>
<title>Classroom Details</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Segoe UI';}

body{
background:linear-gradient(135deg,#1d2671,#c33764);
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
}

.container{
background:#fff;
padding:25px;
border-radius:15px;
width:90%;
max-width:900px;
box-shadow:0 10px 25px rgba(0,0,0,0.3);
}

h2{
text-align:center;
margin-bottom:20px;
}

.grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:20px;
}

@media(max-width:600px){
.grid{grid-template-columns:1fr;}
}

label{
font-weight:bold;
margin-top:10px;
display:block;
}

input,select{
width:100%;
padding:10px;
margin-top:5px;
border:1px solid #ccc;
border-radius:8px;
}

button{
width:100%;
padding:12px;
margin-top:20px;
background:#6a11cb;
color:#fff;
border:none;
border-radius:10px;
cursor:pointer;
font-size:16px;
}

button:hover{
background:#2575fc;
}
</style>
</head>

<body>

<div class="container">

<h2 id="title">Classroom Details</h2>

<div class="grid">

<!-- LEFT -->
<div>
<label>Class Code</label>
<input id="code">

<label>Class Name</label>
<input id="className">

<label>Start Time</label>
<input type="time" id="start">

<label>Status</label>
<select id="status">
<option>Available</option>
<option>Occupied</option>
</select>

<label>CPU</label>
<select id="cpu">
<option>Working</option>
<option>Not Working</option>
</select>

<label>Total Benches</label>
<input type="number" id="benches">
</div>

<!-- RIGHT -->
<div>
<label>Faculty</label>
<input id="faculty">

<label>End Time</label>
<input type="time" id="end">

<label>Projector</label>
<select id="projector">
<option>Working</option>
<option>Not Working</option>
</select>

<label>Student Strength</label>
<input type="number" id="strength">

<label>Purchase Date</label>
<input type="date" id="purchaseDate">

<label>Replace Date</label>
<input type="date" id="replaceDate">
</div>

</div>

<button onclick="saveData()" id="saveBtn">SAVE</button>

</div>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

<script>

// 🔥 YOUR FIREBASE CONFIG (keep yours)
const firebaseConfig = {
apiKey: "YOUR_KEY",
authDomain: "YOUR_DOMAIN",
databaseURL: "YOUR_DB_URL",
projectId: "YOUR_ID"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();


// 🔐 ROLE CONTROL
let role = localStorage.getItem("role");

// Default = student (safe)
if(!role){
role = "student";
}

window.onload = function(){

if(role === "student"){
document.querySelectorAll("input, select").forEach(el=>el.disabled=true);
document.getElementById("saveBtn").style.display="none";
}

};


// 🧠 FULL 40 CLASS MAP
const classMap = {

// A BLOCK (26)
"A1L01":"First Year CSE A",
"A1L02":"First Year CSE B",
"A1L03":"First Year CSE B",
"A1L04":"First Year AIML",
"A1L05":"First Year IT",
"A1L06":"First Year CIVIL",

"A2L01":"Second Year CSE A",
"A2L02":"Second Year CSE B",
"A2L03":"Second Year AIML",
"A2L04":"First Year CSE A",
"A2L05":"First Year MECH",
"A2L06":"Second Year EEE",

"A3L01":"Third Year MECH",
"A3L02":"Third Year CIVIL",
"A3L03":"Third Year IT",
"A3L04":"Third Year AIDS",
"A3L05":"Third Year AIML",
"A3L06":"Third Year CSE",

"A4L01":"Final Year CSE",
"A4L02":"Final Year EEE",
"A4L03":"Final Year MECH",
"A4L04":"Final Year CIVIL",
"A4L05":"Final Year IT",
"A4L06":"Final Year AIDS",

"A5L01":"Computer Lab 1",
"A5L02":"Computer Lab 2",

// B BLOCK (14)
"B1L01":"Second Year CSE",
"B1L02":"Second Year EEE",
"B1L03":"Second Year MECH",
"B1L04":"First Year CIVIL",
"B1L05":"First Year EEE",

"B2L01":"Third Year IT",
"B2L02":"Third Year CSE",
"B2L03":"Third Year AIML",
"B2L04":"Third Year CIVIL",
"B2L05":"Third Year EEE",

"B3L01":"Final Year MECH",
"B3L02":"Final Year CSE",
"B3L03":"Final Year IT",
"B3L04":"Final Year AIDS"

};


// 🔄 LOAD DATA
document.getElementById("code").addEventListener("change", function(){

let code = this.value.toUpperCase();
this.value = code;

// show name instantly
if(classMap[code]){
className.value = classMap[code];
title.innerText = code + " - " + classMap[code];
}

// fetch from Firebase
db.ref("classrooms/" + code).on("value", snap=>{
let d = snap.val();

if(d){
className.value = d.className;
faculty.value = d.faculty;
start.value = d.start;
end.value = d.end;
status.value = d.status;
projector.value = d.projector;
cpu.value = d.cpu;
strength.value = d.strength;
benches.value = d.benches;
purchaseDate.value = d.purchaseDate;
replaceDate.value = d.replaceDate;

title.innerText = code + " - " + d.className;
}
});

});


// 💾 SAVE FUNCTION
function saveData(){

if(role === "student"){
alert("Students cannot edit ❌");
return;
}

let code = document.getElementById("code").value;

let obj = {
fullName: code + " - " + className.value,
className: className.value,
faculty: faculty.value,
start: start.value,
end: end.value,
status: status.value,
projector: projector.value,
cpu: cpu.value,
strength: strength.value,
benches: benches.value,
purchaseDate: purchaseDate.value,
replaceDate: replaceDate.value
};

db.ref("classrooms/" + code).set(obj);

alert("Saved Successfully ✅");
}

</script>

</body>
</html>
